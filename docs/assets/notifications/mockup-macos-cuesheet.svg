<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 440" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <radialGradient id="ffGrad" cx="55%" cy="72%" r="75%">
      <stop offset="0%" stop-color="#FFE24B"/>
      <stop offset="42%" stop-color="#FF9200"/>
      <stop offset="100%" stop-color="#E3390C"/>
    </radialGradient>
    <radialGradient id="sfGrad" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#4AA8FF"/>
      <stop offset="100%" stop-color="#1477E6"/>
    </radialGradient>
  </defs>

  <!-- ================= CHROME · macOS ================= -->
  <text x="44" y="22" font-size="12" font-weight="600" fill="#8a8d92" letter-spacing="0.3">Chrome · macOS</text>
  <rect x="40" y="30" width="380" height="104" rx="20" fill="#F5F5F7" stroke="#000000" stroke-opacity="0.06" filter="url(#cardShadow)"/>
  <!-- chrome logo -->
  <g transform="translate(80,82)">
    <path d="M0 0 L0 19 A19 19 0 0 1 -16.45 -9.5 Z" fill="#34A853"/>
    <path d="M0 0 L-16.45 -9.5 A19 19 0 0 1 16.45 -9.5 Z" fill="#EA4335"/>
    <path d="M0 0 L16.45 -9.5 A19 19 0 0 1 0 19 Z" fill="#FBBC05"/>
    <circle r="8.6" fill="#ffffff"/>
    <circle r="6.4" fill="#4285F4"/>
  </g>
  <text x="116" y="60" font-size="13" font-weight="600" fill="#3c3d40">Google Chrome</text>
  <text x="402" y="60" font-size="12" fill="#a2a4a8" text-anchor="end">now</text>
  <text x="116" y="85" font-size="14" font-weight="600" fill="#161719">Cue Sheet — in 5 min · 7:30 PM</text>
  <text x="116" y="106" font-size="13" fill="#55565a">Act II — house lights to half</text>
  <text x="116" y="124" font-size="13" fill="#55565a">Standby: LX 42, SQ 8</text>

  <!-- ================= SAFARI · macOS ================= -->
  <text x="44" y="162" font-size="12" font-weight="600" fill="#8a8d92" letter-spacing="0.3">Safari · macOS</text>
  <rect x="40" y="170" width="380" height="104" rx="20" fill="#F5F5F7" stroke="#000000" stroke-opacity="0.06" filter="url(#cardShadow)"/>
  <!-- safari compass -->
  <g transform="translate(80,222)">
    <circle r="20" fill="url(#sfGrad)"/>
    <circle r="20" fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="1.6"/>
    <g transform="rotate(35)">
      <polygon points="0,-12 4.2,0 0,0" fill="#F4453C"/>
      <polygon points="0,-12 -4.2,0 0,0" fill="#D63A32"/>
      <polygon points="0,12 4.2,0 0,0" fill="#F2F2F2"/>
      <polygon points="0,12 -4.2,0 0,0" fill="#D9DBDD"/>
    </g>
    <circle r="1.7" fill="#ffffff"/>
  </g>
  <text x="116" y="200" font-size="13" font-weight="600" fill="#3c3d40">Safari</text>
  <text x="402" y="200" font-size="12" fill="#a2a4a8" text-anchor="end">now</text>
  <text x="116" y="225" font-size="14" font-weight="600" fill="#161719">Cue Sheet — in 5 min · 7:30 PM</text>
  <text x="116" y="246" font-size="13" fill="#55565a">Act II — house lights to half</text>
  <text x="116" y="264" font-size="13" fill="#55565a">Standby: LX 42, SQ 8</text>

  <!-- ================= FIREFOX · macOS ================= -->
  <text x="44" y="302" font-size="12" font-weight="600" fill="#8a8d92" letter-spacing="0.3">Firefox · macOS</text>
  <rect x="40" y="310" width="380" height="104" rx="20" fill="#F5F5F7" stroke="#000000" stroke-opacity="0.06" filter="url(#cardShadow)"/>
  <!-- firefox mark (approximate) -->
  <g transform="translate(80,362)">
    <circle r="20" fill="url(#ffGrad)"/>
    <path d="M -6 -19 A 20 20 0 0 0 -19 3 A 13 13 0 0 1 -6 -19 Z" fill="#7B2FA0" opacity="0.55"/>
    <path d="M 12 -15 A 20 20 0 0 1 17 8 A 11 11 0 0 0 12 -15 Z" fill="#FFC845" opacity="0.85"/>
  </g>
  <text x="116" y="340" font-size="13" font-weight="600" fill="#3c3d40">Firefox</text>
  <text x="402" y="340" font-size="12" fill="#a2a4a8" text-anchor="end">now</text>
  <text x="116" y="365" font-size="14" font-weight="600" fill="#161719">Cue Sheet — in 5 min · 7:30 PM</text>
  <text x="116" y="386" font-size="13" fill="#55565a">Act II — house lights to half</text>
  <text x="116" y="404" font-size="13" fill="#55565a">Standby: LX 42, SQ 8</text>
</svg>
